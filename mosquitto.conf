# Mosquitto MQTT Broker Configuration for Lab Monitoring System
# Simpan file ini di:
# Windows: C:\Program Files\mosquitto\mosquitto.conf
# Linux: /etc/mosquitto/mosquitto.conf

# ==================== BASIC CONFIGURATION ====================

# Port untuk MQTT (default: 1883)
listener 1883

# Batasi hanya untuk jaringan lokal (opsional, hapus jika ingin akses dari mana saja)
# bind_address 192.168.3.228

# ==================== LOGGING ====================

# Tipe log: error, warning, notice, information, debug, subscribe, unsubscribe, websockets, all, none
log_type error
log_type warning
log_type notice
log_type information

# ==================== PERSISTENCE ====================

# Simpan pesan dan status ke disk
persistence true
persistence_location /var/lib/mosquitto/
persistence_file mosquitto.db

# ==================== SECURITY ====================

# Izinkan koneksi anonim (untuk development/testing)
# Untuk production, sebaiknya disable dan gunakan authentication
allow_anonymous true

# ==================== TOPIC ACCESS ====================

# Izinkan semua topic untuk lab monitoring
# topic readwrite lab/monitoring/#
# topic readwrite lab/command/#

# ==================== WEBSOCKETS (OPTIONAL) ====================

# Jika ingin akses via web browser, aktifkan WebSocket
listener 9001
protocol websockets

# ==================== CONNECTION LIMITS ====================

# Maksimal klien yang terhubung (0 = unlimited)
max_connections -1

# ==================== MESSAGE QUEUE ====================

# Maksimal pesan yang di-queue per klien
max_queued_messages 1000

# ==================== KEEP ALIVE ====================

# Timeout untuk koneksi (detik)
# If a client doesn't communicate within this time, it's disconnected
# Default: 60 seconds
# max_keepalive 60

# ==================== END OF CONFIGURATION ====================